version: "3"

tasks:
  default:
    desc: List available tasks
    cmds:
      - task --list

  build:
    desc: Build the Python package from pyproject.toml
    cmds:
      - uv build

  test:
    desc: Run the pytest suite
    cmds:
      - uv run --extra dev pytest

  lint:
    desc: Run Ruff lint and format checks through the Python dev environment
    cmds:
      - uv run --extra dev ruff check .
      - uv run --extra dev ruff format --check .

  clean:
    desc: Remove build artifacts and caches
    cmds:
      - find . -type d -name "__pycache__" -prune -exec rm -rf {} +
      - find . -type d \( -name ".pytest_cache" -o -name ".ruff_cache" -o -name ".mypy_cache" -o -name "build" -o -name "dist" -o -name "*.egg-info" \) -prune -exec rm -rf {} +
