version: "3"

tasks:
  default:
    desc: List available tasks
    cmds:
      - task --list

  build:
    desc: Build the Python package from pyproject.toml
    cmds:
      - uv build

  test:
    desc: Run the pytest suite
    cmds:
      - uv run --extra dev pytest

  lint:
    desc: Run Ruff lint and format checks through the Python dev environment
    cmds:
      - uv run --extra dev ruff check .
      - uv run --extra dev ruff format --check .

  clean:
    desc: Remove build artifacts and caches
    cmds:
      - |
        uv run --no-sync python - <<'PY'
        from pathlib import Path
        import shutil

        root = Path(".")
        file_names = {".coverage"}
        dir_names = {
            "__pycache__",
            ".pytest_cache",
            ".ruff_cache",
            ".mypy_cache",
            "htmlcov",
            "build",
            "dist",
        }

        for path in root.rglob("*"):
            if path.is_file() and (path.name in file_names or path.suffix == ".pyc"):
                path.unlink()
            elif path.is_dir() and (path.name in dir_names or path.name.endswith(".egg-info")):
                shutil.rmtree(path)
        PY
